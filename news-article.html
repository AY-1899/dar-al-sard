    <style>
        .article-page { max-width: 780px; margin: 0 auto; padding: 8rem 1.5rem 5rem; }

        .article-back-link {
            display: inline-flex; align-items: center; gap: .4rem;
            color: #002366; font-weight: 700; font-size: .95rem;
            margin-bottom: 2rem; text-decoration: none;
        }
        .article-back-link:hover { text-decoration: underline; }

        /* ── Carousel ── */
        .na-carousel {
            position: relative;
            background: #000;
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 2.2rem;
            box-shadow: 0 8px 32px rgba(0,35,102,.12);
        }
        .na-carousel img {
            width: 100%; height: auto;
            display: block;
        }
        .carousel-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,.45); color: #fff;
            border: none; border-radius: 50%;
            width: 40px; height: 40px;
            font-size: 1.4rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background .2s;
        }
        .carousel-btn:hover { background: rgba(0,0,0,.75); }
        .carousel-prev { left: .6rem; }
        .carousel-next { right: .6rem; }
        .carousel-dots {
            position: absolute; bottom: .7rem; left: 50%; transform: translateX(-50%);
            display: flex; gap: .4rem;
        }
        .carousel-dot {
            width: 9px; height: 9px; border-radius: 50%;
            background: rgba(255,255,255,.5); cursor: pointer;
            transition: background .2s;
        }
        .carousel-dot.active { background: #fff; }

        .na-cat {
            display: inline-block; background: #002366;
            color: #fff; font-size: .8rem; font-weight: 700;
            padding: .25rem .9rem; border-radius: 20px; margin-bottom: 1rem;
        }

        .na-title {
            font-size: 1.8rem; font-weight: 800;
            color: #002366; line-height: 1.45; margin-bottom: 1rem;
        }

        .na-date { color: #999; font-size: .88rem; margin-bottom: 2rem; display: block; }

        .na-divider {
            border: none; border-top: 2px solid #f0f4f8;
            margin-bottom: 2rem;
        }

        .na-body {
            font-family: 'Amiri', serif;
            font-size: 1.22rem; color: #1e1e1e;
            line-height: 2.2; white-space: pre-wrap;
        }

        .article-not-found {
            text-align: center; padding: 6rem 2rem; color: #aaa;
        }
        .article-not-found .icon { font-size: 4rem; margin-bottom: 1rem; }
        .article-not-found p { font-size: 1.1rem; }
    </style>

<script>
function getImages(n) {
    if (Array.isArray(n.images) && n.images.length) return n.images;
    if (n.image) return [n.image];
    return [];
}

function formatDate(d) {
    if (!d) return '';
    try { return new Date(d).toLocaleDateString('ar-IQ', { year:'numeric', month:'long', day:'numeric' }); }
    catch { return d; }
}

// ── Carousel state ────────────────────────────────────────────────────────────
let _imgs = [], _idx = 0;

function carouselStep(dir) {
    if (!_imgs.length) return;
    _idx = (_idx + dir + _imgs.length) % _imgs.length;
    carouselRender();
}

function carouselGoTo(i) { _idx = i; carouselRender(); }

function carouselRender() {
    document.getElementById('na-carousel-img').src = _imgs[_idx];
    document.querySelectorAll('.carousel-dot').forEach((d, i) =>
        d.classList.toggle('active', i === _idx));
}

document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') carouselStep(-1);
    if (e.key === 'ArrowLeft')  carouselStep(1);
});

function renderArticle() {
    const params = new URLSearchParams(location.search);
    const id = parseInt(params.get('id'), 10);
    const container = document.getElementById('article-content');

    if (!id || !newsData) { container.innerHTML = notFound(); return; }
    const n = newsData.find(x => x.id === id);
    if (!n) { container.innerHTML = notFound(); return; }

    document.title = `${n.title} | دار السرد`;

    _imgs = getImages(n);
    _idx  = 0;

    let carouselHtml = '';
    if (_imgs.length) {
        const btns = _imgs.length > 1
            ? `<button class="carousel-btn carousel-prev" onclick="carouselStep(-1)">&#8249;</button>
               <button class="carousel-btn carousel-next" onclick="carouselStep(1)">&#8250;</button>`
            : '';
        const dots = _imgs.length > 1
            ? `<div class="carousel-dots">${_imgs.map((_,i) =>
                `<span class="carousel-dot${i===0?' active':''}" onclick="carouselGoTo(${i})"></span>`
              ).join('')}</div>`
            : '';
        carouselHtml = `
            <div class="na-carousel">
                <img id="na-carousel-img" src="${_imgs[0]}" alt="${n.title}">
                ${btns}
                ${dots}
            </div>`;
    }

    container.innerHTML = `
        <a href="news.html" class="article-back-link">← العودة إلى الأخبار</a>
        ${carouselHtml}
        <span class="na-cat">${n.category || ''}</span>
        <h1 class="na-title">${n.title}</h1>
        <span class="na-date">${formatDate(n.date)}</span>
        <hr class="na-divider">
        <p class="na-body">${n.body || ''}</p>
    `;
}

function notFound() {
    return `
        <a href="news.html" class="article-back-link">← العودة إلى الأخبار</a>
        <div class="article-not-found">
            <div class="icon">📰</div>
            <p>الخبر غير موجود.</p>
        </div>`;
}

renderArticle();
</script>
