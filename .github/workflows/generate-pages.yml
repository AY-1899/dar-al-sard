name: Generate Static Pages

on:
  push:
    paths:
      - 'js/essays.js'
      - 'js/news.js'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate essay and news pages
        run: node generate-pages.mjs

      - name: Commit generated pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add essay-*.html news-*.html
          git diff --cached --quiet || git commit -m "Generate static OG pages for essays and news"
          git push
