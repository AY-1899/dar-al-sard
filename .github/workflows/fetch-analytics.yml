name: Fetch Analytics

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:          # Allow manual run from GitHub

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch GoatCounter stats
        env:
          GC_TOKEN:          ${{ secrets.GC_TOKEN }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node fetch-analytics.mjs

      - name: Commit updated analytics
        run: |
          git config user.name  "Analytics Bot"
          git config user.email "bot@daralsard.com"
          git add js/analytics.json
          git diff --staged --quiet || git commit -m "Update analytics data"
          git push
