name: Fetch Analytics

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:          # Allow manual run from GitHub

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch GoatCounter + GA4 stats
        env:
          GC_TOKEN:           ${{ secrets.GC_TOKEN }}
          GA4_CLIENT_ID:      ${{ secrets.GA4_CLIENT_ID }}
          GA4_CLIENT_SECRET:  ${{ secrets.GA4_CLIENT_SECRET }}
          GA4_REFRESH_TOKEN:  ${{ secrets.GA4_REFRESH_TOKEN }}
          GA4_PROPERTY_ID:    ${{ secrets.GA4_PROPERTY_ID }}
        run: node fetch-analytics.mjs

      - name: Commit updated analytics
        run: |
          git config user.name  "Analytics Bot"
          git config user.email "bot@daralsard.com"
          git add js/analytics.json
          git diff --staged --quiet || git commit -m "Update analytics data"
          git push
