<script>
// Redirect ?id=X to essay-X.html so the URL in the browser bar
// becomes the canonical static page (which has proper OG image tags).
(function () {
    const id = new URLSearchParams(location.search).get('id');
    if (id) {
        const target = 'essay-' + id + '.html';
        // Replace so the back button works correctly
        history.replaceState(null, '', target);
    }
})();
</script>
<script>
function formatDate(d) {
    if (!d) return '';
    try {
        return new Date(d + 'T00:00:00').toLocaleDateString('ar-IQ', { year:'numeric', month:'long', day:'numeric' });
    } catch { return d; }
}

function renderEssay() {
    const params = new URLSearchParams(location.search);
    const id = parseInt(params.get('id'), 10);
    const container = document.getElementById('essay-content');

    if (!id || !essaysData) {
        container.innerHTML = notFound();
        return;
    }

    const e = essaysData.find(x => x.id === id);
    if (!e) {
        container.innerHTML = notFound();
        return;
    }

    // Update page title
    document.title = `${e.title} | دار السرد`;

    const heroHtml = e.image
        ? `<img src="${e.image}" alt="${e.title}" class="essay-hero">`
        : '';

    const avatarHtml = e.authorImage
        ? `<img src="${e.authorImage}" alt="${e.author}" class="author-avatar">`
        : '';

    const abstractHtml = e.abstract
        ? `<div class="em-abstract">${e.abstract}</div><hr class="em-divider">`
        : '';

    container.innerHTML = `
        <a href="essays.html" class="essay-back-link">← العودة إلى المقالات</a>
        ${heroHtml}
        <span class="em-label">مقال</span>
        <h1 class="em-title">${e.title}</h1>
        <div class="em-author-row">
            ${avatarHtml}
            <div class="em-author-info">
                <span class="em-author-name">✍️ ${e.author}</span>
                <span class="em-date">${formatDate(e.date)}</span>
            </div>
        </div>
        ${abstractHtml}
        <p class="em-body">${e.body || ''}</p>
    `;
}

function notFound() {
    return `
        <a href="essays.html" class="essay-back-link">← العودة إلى المقالات</a>
        <div class="essay-not-found">
            <div class="icon">📄</div>
            <p>المقال غير موجود.</p>
        </div>`;
}

renderEssay();
</script>
